## Netlify config for NeonTube (TanStack Start + Nitro)
## With NITRO_PRESET=netlify, Nitro builds a Netlify Function AND writes
## its own _redirects into .output/public. Do NOT add a manual catch-all
## redirect or override the publish dir — that's what caused the 404.

[build]
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"
